# =============================================================================
# OceanBase Logs → file (JSON lines)
# =============================================================================

<source>
  @type oceanbase_logs
  tag  oceanbase.slow_sql
  log_type slow_sql

  access_key_id     "#{ENV['OCEANBASE_ACCESS_KEY_ID']}"
  access_key_secret "#{ENV['OCEANBASE_ACCESS_KEY_SECRET']}"

  instance_id  "#{ENV['OCEANBASE_INSTANCE_ID']}"
  tenant_id    "#{ENV['OCEANBASE_TENANT_ID']}"

  # 服务接入点（API 地址，可用 OCEANBASE_ENDPOINT 覆盖）
  endpoint "#{ENV['OCEANBASE_ENDPOINT'] || 'api-cloud-cn.oceanbase.com'}"
  # 采集间隔（秒）
  fetch_interval    "#{ENV['OCEANBASE_FETCH_INTERVAL'] || 300}"
  # 采集时间范围（秒）
  lookback_seconds  "#{ENV['OCEANBASE_LOOKBACK_SECONDS'] || 600}"

  deduplicate       true
  include_metadata  true

  <storage>
    @type local
    persistent true
    path /var/log/fluentd/oceanbase_slow_sql_state
  </storage>
</source>

<source>
  @type oceanbase_logs
  tag  oceanbase.top_sql
  log_type top_sql

  access_key_id     "#{ENV['OCEANBASE_ACCESS_KEY_ID']}"
  access_key_secret "#{ENV['OCEANBASE_ACCESS_KEY_SECRET']}"

  instance_id  "#{ENV['OCEANBASE_INSTANCE_ID']}"
  tenant_id    "#{ENV['OCEANBASE_TENANT_ID']}"

  endpoint "#{ENV['OCEANBASE_ENDPOINT'] || 'api-cloud-cn.oceanbase.com'}"
  fetch_interval    "#{ENV['OCEANBASE_FETCH_INTERVAL'] || 300}"
  lookback_seconds  "#{ENV['OCEANBASE_LOOKBACK_SECONDS'] || 600}"

  deduplicate       true
  include_metadata  true

  <storage>
    @type local
    persistent true
    path /var/log/fluentd/oceanbase_top_sql_state
  </storage>
</source>

<match oceanbase.**>
  @type file
  path /var/log/fluentd/oceanbase_logs
  append true
  <format>
    @type json
  </format>
  <buffer tag>
    @type file
    path /var/log/fluentd/buffer/oceanbase_logs
    flush_interval 30s
    chunk_limit_size 8m
  </buffer>
</match>
