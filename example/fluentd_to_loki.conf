# =============================================================================
# OceanBase Logs → Grafana Loki
# =============================================================================
# Requires: fluent-plugin-grafana-loki

<source>
  @type oceanbase_logs
  tag  oceanbase.slow_sql
  log_type slow_sql

  access_key_id     "#{ENV['OCEANBASE_ACCESS_KEY_ID']}"
  access_key_secret "#{ENV['OCEANBASE_ACCESS_KEY_SECRET']}"

  instance_id  "#{ENV['OCEANBASE_INSTANCE_ID']}"
  tenant_id    "#{ENV['OCEANBASE_TENANT_ID']}"

  endpoint "#{ENV['OCEANBASE_ENDPOINT'] || 'api-cloud-cn.oceanbase.com'}"
  fetch_interval    "#{ENV['OCEANBASE_FETCH_INTERVAL'] || 300}"
  lookback_seconds  "#{ENV['OCEANBASE_LOOKBACK_SECONDS'] || 600}"

  deduplicate       true
  include_metadata  true

  <storage>
    @type local
    persistent true
    path /var/log/fluentd/oceanbase_slow_sql.state
  </storage>
</source>

<source>
  @type oceanbase_logs
  tag  oceanbase.top_sql
  log_type top_sql

  access_key_id     "#{ENV['OCEANBASE_ACCESS_KEY_ID']}"
  access_key_secret "#{ENV['OCEANBASE_ACCESS_KEY_SECRET']}"

  instance_id  "#{ENV['OCEANBASE_INSTANCE_ID']}"
  tenant_id    "#{ENV['OCEANBASE_TENANT_ID']}"

  endpoint "#{ENV['OCEANBASE_ENDPOINT'] || 'api-cloud-cn.oceanbase.com'}"
  fetch_interval    "#{ENV['OCEANBASE_FETCH_INTERVAL'] || 300}"
  lookback_seconds  "#{ENV['OCEANBASE_LOOKBACK_SECONDS'] || 600}"

  deduplicate       true
  include_metadata  true

  <storage>
    @type local
    persistent true
    path /var/log/fluentd/oceanbase_top_sql.state
  </storage>
</source>

<filter oceanbase.**>
  @type record_transformer
  enable_ruby true
  <record>
    message ${record["sqlTextShort"]}
  </record>
</filter>

<match oceanbase.**>
  @type loki
  url http://localhost:3100

  extra_labels {"job":"oceanbase-logs"}

  <label>
    ob_instance_id
    ob_tenant_id
    ob_log_type
    dbName
    sqlType
    userName
  </label>

  remove_keys ob_instance_id,ob_tenant_id,ob_log_type

  <buffer>
    @type memory
    flush_interval 10s
    chunk_limit_size 1m
    retry_max_interval 30s
    retry_forever true
  </buffer>
</match>
