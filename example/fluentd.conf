# =============================================================================
# OceanBase Slow SQL → file (one record per execution, dedup by traceId)
# =============================================================================

<source>
  @type oceanbase_logs
  tag  oceanbase.slow_sql
  log_type slow_sql

  access_key_id     "#{ENV['OCEANBASE_ACCESS_KEY_ID']}"
  access_key_secret "#{ENV['OCEANBASE_ACCESS_KEY_SECRET']}"

  instance_id  "#{ENV['OCEANBASE_INSTANCE_ID']}"
  tenant_id    "#{ENV['OCEANBASE_TENANT_ID']}"

  # 服务接入点（OceanBase Cloud API 地址，可用环境变量 OCEANBASE_ENDPOINT 覆盖）
  endpoint "#{ENV['OCEANBASE_ENDPOINT'] || 'api-cloud-cn.oceanbase.com'}"

  # 采集间隔（秒）：每隔多久请求一次 API
  fetch_interval    "#{ENV['OCEANBASE_FETCH_INTERVAL'] || 60}"
  # 采集时间范围（秒）：每次请求查询最近多长时间的数据
  lookback_seconds  "#{ENV['OCEANBASE_LOOKBACK_SECONDS'] || 600}"

  sql_text_length   65535

  deduplicate       true
  include_metadata  true

  <storage>
    @type local
    persistent true
    path /fluentd/state/slow_sql_seen
  </storage>
</source>

<match oceanbase.slow_sql>
  @type file
  path /fluentd/output/slow_sql
  append true
  <format>
    @type json
  </format>
  <buffer>
    @type file
    path /fluentd/buffer/slow_sql
    flush_mode interval
    flush_interval 5s
  </buffer>
</match>
